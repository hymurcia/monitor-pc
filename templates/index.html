<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de PC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🖥️ Monitor de Recursos del PC</h1>
        
        <div class="metric">
            <div class="metric-label">
                <span>Uso de CPU:</span> <span id="cpu-value" class="metric-value">{{ "%.1f"|format(cpu_percent) }}%</span>
            </div>
            <div class="progress-bar"><div id="cpu-progress" class="progress"></div></div>
        </div>
        
        <div class="metric">
            <div class="metric-label">
                <span>Uso de RAM:</span> <span id="ram-value" class="metric-value">{{ "%.1f"|format(ram_percent) }}%</span>
            </div>
            <div class="progress-bar"><div id="ram-progress" class="progress"></div></div>
        </div>
        
        <div class="metric">
            <div class="metric-label">
                <span>Actividad de Disco:</span> <span id="disk-value" class="metric-value">0.0%</span>
            </div>
            <div class="progress-bar"><div id="disk-progress" class="progress"></div></div>
            <div class="disk-space-info">
                Espacio usado: <span id="disk-space-value">{{ "%.1f"|format(disk_percent) }}%</span>
            </div>
        </div>
        
        <div class="status-bar">
            <span id="last-update">Cargando...</span>
            <span>Actualización: {{ refresh_interval // 1000 }}s</span>
        </div>
        
        <div class="chart-container">
            <canvas id="historyChart" width="400" height="200"></canvas>
        </div>
        
        <div id="alert-box" class="alert">
            ⚠️ Alerta: Recursos críticos detectados
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        window.initialData = {
            cpu: {{ cpu_percent }},
            ram: {{ ram_percent }},
            disk: {{ disk_percent }},
            refreshInterval: {{ refresh_interval }}
        };
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
